title: AI News Digest
description: Daily curated digest of AI research papers, news, and security articles. Generated automatically each morning.
url: "https://eddyariki.github.io"
baseurl: "/news-feed-digest"

theme: minima

plugins:
  - jekyll-optional-front-matter
  - jekyll-relative-links
  - jekyll-titles-from-headings
  - jekyll-seo-tag
  - jekyll-feed

minima:
  skin: classic

# Don't publish fact-check reports publicly
exclude:
  - "*/factcheck.md"
  - README.md
  - "*.sh"
