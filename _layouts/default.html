<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── MD3 Color Tokens ───────────────────────────────── */
    :root {
      --primary:            #1A73E8;
      --on-primary:         #FFFFFF;
      --primary-container:  #D2E3FC;
      --on-primary-cont:    #001D36;
      --bg:                 #F8F9FA;
      --surface:            #FFFFFF;
      --surface-var:        #F1F3F4;
      --on-surface:         #202124;
      --on-surface-var:     #5F6368;
      --outline:            #DADCE0;
      --outline-strong:     #80868B;
      --error:              #D93025;
      --scrim:              rgba(0, 0, 0, 0.32);
      --chip-bg:            #E8F0FE;
      --chip-text:          #1558D6;
      --hover-state:        rgba(26, 115, 232, 0.08);
      --elev-1: 0 1px 2px rgba(0,0,0,.18), 0 1px 3px 1px rgba(0,0,0,.10);
      --elev-2: 0 1px 2px rgba(0,0,0,.18), 0 2px 6px 2px rgba(0,0,0,.10);
      --elev-3: 0 4px 8px 3px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.18);
      --elev-5: 0 8px 12px 6px rgba(0,0,0,.10), 0 4px 4px rgba(0,0,0,.18);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary:            #8AB4F8;
        --on-primary:         #003062;
        --primary-container:  #004487;
        --on-primary-cont:    #D2E3FC;
        --bg:                 #121212;
        --surface:            #1E1E1E;
        --surface-var:        #2A2A2A;
        --on-surface:         #E3E3E3;
        --on-surface-var:     #ADADAD;
        --outline:            #3C4043;
        --outline-strong:     #80868B;
        --error:              #F28B82;
        --scrim:              rgba(0, 0, 0, 0.5);
        --chip-bg:            #1A3558;
        --chip-text:          #8AB4F8;
        --hover-state:        rgba(138, 180, 248, 0.08);
        --elev-1: 0 1px 3px 1px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.45);
        --elev-2: 0 2px 6px 2px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.45);
        --elev-3: 0 4px 8px 3px rgba(0,0,0,.45), 0 1px 3px rgba(0,0,0,.45);
        --elev-5: 0 8px 12px 6px rgba(0,0,0,.45), 0 4px 4px rgba(0,0,0,.45);
      }
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.75;
      color: var(--on-surface);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top App Bar (MD3) ──────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      box-shadow: var(--elev-2);
      padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .site-logo {
      display: flex; align-items: center; gap: 0.625rem;
      font-weight: 500; font-size: 1.25rem;
      color: var(--on-surface); text-decoration: none;
      letter-spacing: 0;
    }
    .site-logo .pip {
      width: 10px; height: 10px;
      background: var(--primary);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .site-logo:hover { color: var(--primary); text-decoration: none; }

    /* Text Button style for back link */
    .back-link {
      font-size: 0.875rem; font-weight: 500;
      letter-spacing: 0.00625em;
      color: var(--primary);
      text-decoration: none;
      padding: 0.5rem 0.875rem;
      border-radius: 9999px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .back-link:hover { background: var(--hover-state); text-decoration: none; color: var(--primary); }

    /* ── Main layout ────────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 5rem;
    }

    /* Content card — elevated surface */
    .content {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      box-shadow: var(--elev-1);
    }

    /* ── Typography (MD3 type scale) ────────────────────── */
    h1 {
      font-size: clamp(1.625rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: -0.25px;
      line-height: 1.25;
      margin: 0 0 1.25rem;
      color: var(--on-surface);
    }
    h2 {
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: 0;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--outline);
      color: var(--on-surface);
    }
    h3 {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--on-surface-var);
      margin: 1.75rem 0 0.5rem;
    }
    p { margin: 0 0 1rem; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--primary); }
    strong { font-weight: 500; }
    hr {
      border: none;
      border-top: 1px solid var(--outline);
      margin: 2rem 0;
    }

    /* ── Blockquote ─────────────────────────────────────── */
    blockquote {
      margin: 0 0 2rem;
      padding: 1rem 1.25rem;
      background: var(--primary-container);
      border-left: 4px solid var(--primary);
      border-radius: 0 8px 8px 0;
      color: var(--on-primary-cont);
      font-size: 0.9375rem;
      line-height: 1.65;
    }
    blockquote p { margin: 0; }

    /* ── Lists ──────────────────────────────────────────── */
    ul, ol { padding-left: 1.375rem; margin: 0 0 1rem; }
    li { margin: 0.4rem 0; }

    /* Article link — Body Medium (500) */
    li > strong:first-child > a,
    li > p > strong:first-child > a {
      font-weight: 500;
      font-size: 0.9625rem;
      color: var(--primary);
    }

    /* Source chip — MD3 Assist Chip style */
    li > em:last-of-type,
    li > p > em:last-of-type {
      font-style: normal;
      font-size: 0.6875rem;
      font-weight: 500;
      background: var(--chip-bg);
      color: var(--chip-text);
      padding: 0.15em 0.6em;
      border-radius: 8px;
      margin-left: 0.25rem;
      white-space: nowrap;
      display: inline-block;
      letter-spacing: 0.005em;
    }

    /* Italic note at page bottom */
    p > em:only-child {
      font-style: italic;
      color: var(--on-surface-var);
      font-size: 0.875rem;
    }

    /* ── Code ───────────────────────────────────────────── */
    code {
      font-family: 'Roboto Mono', "SFMono-Regular", Consolas, monospace;
      font-size: 0.825em;
      background: var(--surface-var);
      border: 1px solid var(--outline);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }

    /* ── Tables ─────────────────────────────────────────── */
    .content table {
      width: 100%; border-collapse: collapse;
      font-size: 0.875rem; margin: 1.25rem 0;
      display: block; overflow-x: auto;
    }
    .content th {
      background: var(--surface-var); font-weight: 500;
      text-align: left; padding: 0.5rem 0.75rem;
      border: 1px solid var(--outline);
    }
    .content td {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--outline);
      vertical-align: top;
    }
    .content tr:nth-child(even) td { background: var(--surface-var); }

    /* ── Index page ─────────────────────────────────────── */
    .is-index .content {
      background: transparent;
      box-shadow: none;
      padding: 0;
    }
    .is-index .content > ul {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .is-index .content > ul > li {
      margin: 0;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--elev-1);
      display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
      transition: box-shadow 0.2s;
    }
    .is-index .content > ul > li:hover { box-shadow: var(--elev-3); }
    .is-index .content > ul > li > strong {
      font-size: 0.9375rem; font-weight: 500;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0; color: var(--on-surface);
    }
    .is-index .content > ul > li > em:last-of-type {
      background: none; color: var(--on-surface-var);
      font-size: inherit; padding: 0; margin: 0; border-radius: 0;
    }
    /* Outlined pill buttons for digest/papers links */
    .is-index .content > ul > li a {
      font-size: 0.8125rem; font-weight: 500;
      letter-spacing: 0.00625em;
      color: var(--primary); text-decoration: none;
      padding: 0.375rem 0.875rem;
      border: 1px solid var(--primary);
      border-radius: 9999px;
      transition: background 0.2s; white-space: nowrap;
    }
    .is-index .content > ul > li a:hover {
      background: var(--primary-container); text-decoration: none;
    }
    .is-index .content > ul > li .digest-links {
      display: flex; gap: 0.5rem; flex-shrink: 0;
    }

    /* ── Footer ─────────────────────────────────────────── */
    .site-footer {
      padding: 1.5rem; text-align: center;
      color: var(--on-surface-var); font-size: 0.8125rem;
    }
    .site-footer a { color: var(--on-surface-var); }
    .site-footer a:hover { color: var(--primary); text-decoration: none; }

    /* ══ Save / Bookmarks (MD3) ════════════════════════════ */

    /* Header "Saved" — Text Button */
    .saved-count-btn {
      font-size: 0.875rem; font-weight: 500;
      font-family: 'Roboto', sans-serif;
      letter-spacing: 0.00625em;
      color: var(--primary); padding: 0.5rem 0.875rem;
      border: none; border-radius: 9999px;
      background: none; cursor: pointer;
      transition: background 0.2s; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .saved-count-btn:hover { background: var(--hover-state); }
    .saved-badge {
      background: var(--primary); color: var(--on-primary);
      border-radius: 9999px; padding: 0 6px;
      font-size: 0.6875rem; font-weight: 700;
      line-height: 1.6; min-width: 18px;
      text-align: center; display: none;
    }

    /* Inline Save button — Tonal Filled Button (MD3) */
    .save-btn {
      border: none;
      background: var(--primary-container);
      cursor: pointer;
      font-size: 0.75rem; font-weight: 500;
      font-family: 'Roboto', sans-serif;
      letter-spacing: 0.00625em;
      color: var(--on-primary-cont);
      padding: 0.25em 0.875em;
      border-radius: 9999px;
      margin-left: 0.5rem;
      transition: box-shadow 0.2s, filter 0.2s;
      vertical-align: middle; line-height: 1.7;
    }
    .save-btn:hover { box-shadow: var(--elev-1); filter: brightness(0.96); }
    .save-btn.is-saved {
      background: var(--primary); color: var(--on-primary);
    }
    .save-btn.is-saved:hover { filter: brightness(1.08); }

    /* Modal Navigation Drawer scrim */
    .saved-overlay {
      visibility: hidden; opacity: 0;
      position: fixed; inset: 0;
      background: var(--scrim);
      z-index: 200;
      transition: opacity 0.25s cubic-bezier(0.4,0,0.2,1),
                  visibility 0s linear 0.25s;
    }
    .saved-overlay.open {
      visibility: visible; opacity: 1;
      transition: opacity 0.25s cubic-bezier(0.4,0,0.2,1),
                  visibility 0s linear 0s;
    }

    /* Modal Navigation Drawer panel */
    .saved-panel {
      position: fixed; top: 0; right: 0;
      width: min(400px, 96vw); height: 100%;
      background: var(--surface);
      box-shadow: var(--elev-5);
      border-radius: 16px 0 0 16px;
      overflow-y: auto; z-index: 201;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .saved-overlay.open .saved-panel { transform: translateX(0); }

    .saved-panel-header {
      position: sticky; top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--outline);
      padding: 1.25rem 1.5rem 1rem;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .saved-panel-title {
      font-size: 1.25rem; font-weight: 400;
      letter-spacing: 0; color: var(--on-surface);
    }
    .saved-panel-close {
      background: none; border: none; cursor: pointer;
      color: var(--on-surface-var); font-size: 1.125rem;
      width: 40px; height: 40px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0;
    }
    .saved-panel-close:hover { background: var(--surface-var); }

    #saved-list {
      padding: 0.75rem 0.75rem 1.5rem;
      display: flex; flex-direction: column;
      gap: 2px; flex: 1;
    }
    .saved-empty {
      color: var(--on-surface-var); font-size: 0.9375rem;
      text-align: center; margin-top: 2.5rem; line-height: 1.75;
    }

    /* Saved article — MD3 List Item */
    .saved-article-item {
      padding: 0.875rem 1rem;
      border-radius: 12px;
      display: flex; flex-direction: column; gap: 0.25rem;
      transition: background 0.15s; cursor: default;
    }
    .saved-article-item:hover { background: var(--surface-var); }
    .saved-article-title {
      font-size: 0.9375rem; font-weight: 500;
      color: var(--primary); text-decoration: none;
      line-height: 1.45;
    }
    .saved-article-title:hover { text-decoration: underline; }
    .saved-article-summary {
      font-size: 0.8125rem; color: var(--on-surface-var);
      line-height: 1.5; margin: 0.1rem 0 0;
    }
    .saved-article-source {
      font-size: 0.6875rem; font-weight: 500;
      letter-spacing: 0.005em;
      background: var(--chip-bg); color: var(--chip-text);
      padding: 0.1em 0.55em; border-radius: 8px;
    }
    .saved-article-meta {
      font-size: 0.75rem; color: var(--on-surface-var);
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 0.35rem; gap: 0.5rem;
    }
    .saved-article-meta-left {
      display: flex; align-items: center; gap: 0.4rem;
    }

    /* Remove / Clear — Text Buttons */
    .saved-remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--error); font-size: 0.75rem; font-weight: 500;
      font-family: 'Roboto', sans-serif; letter-spacing: 0.00625em;
      padding: 0.25rem 0.5rem; border-radius: 9999px;
      transition: background 0.2s;
    }
    .saved-remove-btn:hover { background: rgba(217,48,37,0.08); }
    .saved-clear-btn {
      font-size: 0.8125rem; font-weight: 500;
      font-family: 'Roboto', sans-serif; letter-spacing: 0.00625em;
      color: var(--error); background: none;
      border: 1px solid var(--outline); border-radius: 9999px;
      padding: 0.4rem 1rem; cursor: pointer;
      margin-top: 0.75rem; align-self: flex-start;
      transition: background 0.2s, border-color 0.2s;
    }
    .saved-clear-btn:hover { background: rgba(217,48,37,0.08); border-color: var(--error); }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 640px) {
      main { padding: 0.75rem 0.75rem 4rem; }
      .content { padding: 1.25rem 1rem; border-radius: 8px; }
      .site-header { padding: 0 1rem; }
      .is-index .content > ul > li {
        flex-direction: column; align-items: flex-start; gap: 0.5rem;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="{{ site.baseurl }}/" class="site-logo">
      <span class="pip"></span>AI News Digest
    </a>
    {% assign url = page.url | remove: 'index.html' %}
    {% if url != '/' and url != '' %}
    <a href="{{ site.baseurl }}/" class="back-link">← All digests</a>
    {% endif %}
  </div>
</header>

<main>
  {% assign url = page.url | remove: 'index.html' %}
  <div class="content {% if url == '/' or url == '' %}is-index{% endif %}">
    {{ content }}
  </div>
</main>

<footer class="site-footer">
  <p>Generated automatically each morning &middot;
     <a href="https://github.com/eddyariki/news-feed-digest">GitHub</a></p>
</footer>

<script>
(function () {
  'use strict';

  /* ── localStorage helpers ───────────────────────────── */
  var KEY = 'nc_saved';
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (e) { return []; }
  }
  function setSaved(arr) { localStorage.setItem(KEY, JSON.stringify(arr)); }
  function isSaved(url) { return getSaved().some(function (a) { return a.url === url; }); }
  function saveArticle(url, title, source, summary) {
    var arr = getSaved().filter(function (a) { return a.url !== url; });
    arr.unshift({ url: url, title: title, source: source || '', summary: summary || '', savedAt: new Date().toISOString() });
    setSaved(arr);
  }
  function unsaveArticle(url) { setSaved(getSaved().filter(function (a) { return a.url !== url; })); }

  /* ── Utilities ──────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ── Build saved panel overlay ──────────────────────── */
  var overlay = document.createElement('div');
  overlay.className = 'saved-overlay';
  overlay.innerHTML =
    '<div class="saved-panel">' +
      '<div class="saved-panel-header">' +
        '<span class="saved-panel-title">Saved Articles</span>' +
        '<button class="saved-panel-close" aria-label="Close">&#x2715;</button>' +
      '</div>' +
      '<div id="saved-list"></div>' +
    '</div>';
  document.body.appendChild(overlay);

  function openPanel()  { overlay.classList.add('open'); renderSavedList(); }
  function closePanel() { overlay.classList.remove('open'); }

  overlay.addEventListener('click', function (e) { if (e.target === overlay) closePanel(); });
  overlay.querySelector('.saved-panel-close').addEventListener('click', closePanel);

  function renderSavedList() {
    var list = document.getElementById('saved-list');
    var saved = getSaved();
    if (saved.length === 0) {
      list.innerHTML = '<p class="saved-empty">No saved articles yet.<br>Click <strong>Save</strong> on any article.</p>';
      return;
    }
    var html = saved.map(function (a) {
      return '<div class="saved-article-item">' +
        '<a class="saved-article-title" href="' + esc(a.url) + '" target="_blank" rel="noopener noreferrer">' + esc(a.title) + '</a>' +
        (a.summary ? '<p class="saved-article-summary">' + esc(a.summary) + '</p>' : '') +
        '<div class="saved-article-meta">' +
          '<div class="saved-article-meta-left">' +
            (a.source ? '<span class="saved-article-source">' + esc(a.source) + '</span>' : '') +
            '<span>' + fmtDate(a.savedAt) + '</span>' +
          '</div>' +
          '<button class="saved-remove-btn" data-url="' + esc(a.url) + '">Remove</button>' +
        '</div>' +
      '</div>';
    }).join('') + '<button class="saved-clear-btn" id="saved-clear-btn">Clear all</button>';
    list.innerHTML = html;

    list.querySelectorAll('.saved-remove-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        unsaveArticle(btn.dataset.url);
        updateAllSaveBtns();
        updateHeaderCount();
        renderSavedList();
      });
    });
    var clearBtn = document.getElementById('saved-clear-btn');
    if (clearBtn) {
      clearBtn.addEventListener('click', function () {
        setSaved([]);
        updateAllSaveBtns();
        updateHeaderCount();
        renderSavedList();
      });
    }
  }

  /* ── Header "Saved" button ──────────────────────────── */
  var headerInner = document.querySelector('.header-inner');
  var savedBtn = document.createElement('button');
  savedBtn.className = 'saved-count-btn';
  savedBtn.innerHTML = 'Saved <span class="saved-badge" id="saved-badge"></span>';
  savedBtn.addEventListener('click', openPanel);
  var backLink = headerInner && headerInner.querySelector('.back-link');
  if (backLink) { headerInner.insertBefore(savedBtn, backLink); }
  else if (headerInner) { headerInner.appendChild(savedBtn); }

  function updateHeaderCount() {
    var count = getSaved().length;
    var badge = document.getElementById('saved-badge');
    if (!badge) return;
    badge.textContent = count > 0 ? String(count) : '';
    badge.style.display = count > 0 ? 'inline' : 'none';
  }

  function updateAllSaveBtns() {
    document.querySelectorAll('.save-btn').forEach(function (btn) {
      var saved = isSaved(btn.dataset.url);
      btn.textContent = saved ? '\u2713 Saved' : '\uD83D\uDD16 Save';
      btn.classList.toggle('is-saved', saved);
    });
  }

  /* ── Inject save buttons ────────────────────────────── */
  var isIndex = document.querySelector('.content.is-index');

  /* ── Description extractors ────────────────────────── */
  function getArticleDesc(container, strongEl, emEl) {
    var buf = '', past = false;
    container.childNodes.forEach(function (node) {
      if (!past) { if (node === strongEl) { past = true; } return; }
      if (emEl && node === emEl) return;
      buf += node.textContent || '';
    });
    return buf.replace(/^\s*[—–\-]\s*/, '').replace(/\([^)]*\)\s*$/, '').trim().slice(0, 220);
  }

  function getPaperSummary(linkStrong) {
    var el = linkStrong.parentNode.nextElementSibling;
    while (el) {
      if (el.tagName === 'H3' && /summary/i.test(el.textContent)) {
        var p = el.nextElementSibling;
        if (p && p.textContent) {
          var text = p.textContent.trim();
          var cut = text.search(/[.!?]\s/);
          return (cut > 0 && cut < 220 ? text.slice(0, cut + 1) : text.slice(0, 220)).trim();
        }
        break;
      }
      el = el.nextElementSibling;
    }
    return '';
  }

  function makeSaveBtn(url, title, source, summary) {
    var btn = document.createElement('button');
    btn.className = 'save-btn' + (isSaved(url) ? ' is-saved' : '');
    btn.dataset.url = url;
    btn.textContent = isSaved(url) ? '\u2713 Saved' : '\uD83D\uDD16 Save';
    btn.addEventListener('click', function () {
      if (isSaved(url)) {
        unsaveArticle(url);
        btn.textContent = '\uD83D\uDD16 Save';
        btn.classList.remove('is-saved');
      } else {
        saveArticle(url, title, source, summary);
        btn.textContent = '\u2713 Saved';
        btn.classList.add('is-saved');
      }
      updateHeaderCount();
    });
    return btn;
  }

  if (!isIndex) {
    // Digest pages — news article list items.
    // Tight lists: li > strong > a
    // Loose lists (blank lines between items): li > p > strong > a
    document.querySelectorAll('.content li').forEach(function (li) {
      var firstChild = li.children[0];
      if (!firstChild) return;
      var container = (firstChild.tagName === 'P') ? firstChild : li;
      var strong = container.children[0];
      if (!strong || strong.tagName !== 'STRONG') return;
      var link = strong.querySelector('a');
      if (!link) return;
      var sourceEl = li.querySelector('em');
      var source = sourceEl ? sourceEl.textContent.trim() : '';
      var summary = getArticleDesc(container, strong, sourceEl);
      container.appendChild(makeSaveBtn(link.href, link.textContent.trim(), source, summary));
    });

    // Papers pages — find every <strong>Link:</strong> and get the adjacent <a>.
    // Authors/Link/Tags are on consecutive lines so kramdown merges them into
    // one <p>; p.querySelector('strong') would return Authors, not Link.
    document.querySelectorAll('.content strong').forEach(function (strong) {
      if (strong.textContent.trim() !== 'Link:') return;
      var node = strong.nextSibling;
      while (node && node.nodeType !== 1) node = node.nextSibling;
      if (!node || node.tagName !== 'A') return;
      if (strong.parentNode.querySelector('.save-btn')) return;
      var summary = getPaperSummary(strong);
      strong.parentNode.appendChild(makeSaveBtn(node.href, node.textContent.trim(), 'ArXiv', summary));
    });
  }

  /* ── External links ─────────────────────────────────── */
  document.querySelectorAll('.content a[href^="http"]').forEach(function (a) {
    a.setAttribute('target', '_blank');
    a.setAttribute('rel', 'noopener noreferrer');
  });

  updateHeaderCount();
}());
</script>
</body>
</html>
