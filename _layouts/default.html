<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --bg:           #ffffff;
      --bg-subtle:    #f6f8fa;
      --border:       #d0d7de;
      --border-muted: #eaeef2;
      --text:         #1f2328;
      --text-muted:   #636c76;
      --link:         #0969da;
      --link-hover:   #0550ae;
      --accent-bg:    #ddf4ff;
      --accent-border:#54aeff;
      --tag-bg:       #ddf4ff;
      --tag-text:     #0550ae;
      --highlight-bg: #fffbdd;
      --highlight-bd: #d4a72c;
      --code-bg:      #f6f8fa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #0d1117;
        --bg-subtle:    #161b22;
        --border:       #30363d;
        --border-muted: #21262d;
        --text:         #e6edf3;
        --text-muted:   #8b949e;
        --link:         #58a6ff;
        --link-hover:   #79c0ff;
        --accent-bg:    #1c2d3e;
        --accent-border:#1f6feb;
        --tag-bg:       #1c2d3e;
        --tag-text:     #79c0ff;
        --highlight-bg: #272115;
        --highlight-bd: #9e6a03;
        --code-bg:      #161b22;
      }
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                   Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.75;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ────────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .site-logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: 700; font-size: 0.9375rem;
      color: var(--text); text-decoration: none;
      letter-spacing: -0.01em;
    }
    .site-logo .pip {
      width: 8px; height: 8px;
      background: var(--link);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .site-logo:hover { color: var(--link); }
    .back-link {
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.25rem 0.625rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--link); border-color: var(--link); }

    /* ── Main layout ───────────────────────────────────────── */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── Typography ────────────────────────────────────────── */
    h1 {
      font-size: clamp(1.75rem, 4vw, 2.375rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin: 0 0 1.25rem;
      color: var(--text);
    }
    h2 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 3rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    h3 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 2rem 0 0.625rem;
    }
    p { margin: 0 0 1rem; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--link-hover); }
    strong { font-weight: 600; }
    hr {
      border: none;
      border-top: 1px solid var(--border-muted);
      margin: 2.5rem 0;
    }

    /* ── Blockquote — digest subtitle ──────────────────────── */
    blockquote {
      margin: 0 0 2rem;
      padding: 0.875rem 1.125rem;
      background: var(--accent-bg);
      border-left: 3px solid var(--accent-border);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
      font-size: 0.875rem;
      line-height: 1.65;
    }
    blockquote p { margin: 0; }

    /* ── Lists ─────────────────────────────────────────────── */
    ul, ol { padding-left: 1.375rem; margin: 0 0 1rem; }
    li { margin: 0.4rem 0; }

    /* Article entries: **[Title](url)** — desc *(Source)* */
    li > strong:first-child > a {
      font-weight: 700;
      font-size: 0.9625rem;
    }
    /* Source tag — the trailing *(Source)* */
    li > em:last-of-type,
    li > p > em:last-of-type {
      font-style: normal;
      font-size: 0.72rem;
      font-weight: 500;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.15em 0.55em;
      border-radius: 20px;
      margin-left: 0.2rem;
      white-space: nowrap;
      display: inline-block;
    }

    /* Highlights list — bold key:value bullets */
    h2:has(+ ul) + ul > li,
    h2 + ul > li {
      padding: 0.1rem 0;
    }

    /* Italic note at page bottom (links to papers.md) */
    p > em:only-child {
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* ── Inline code ───────────────────────────────────────── */
    code {
      font-family: "SFMono-Regular", "Fira Code", "Cascadia Code",
                   Consolas, monospace;
      font-size: 0.825em;
      background: var(--code-bg);
      border: 1px solid var(--border-muted);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }

    /* ── Tables ────────────────────────────────────────────── */
    .content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      margin: 1.25rem 0;
      display: block;
      overflow-x: auto;
    }
    .content th {
      background: var(--bg-subtle);
      font-weight: 600;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
    }
    .content td {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    .content tr:nth-child(even) td { background: var(--bg-subtle); }

    /* ── Index page ────────────────────────────────────────── */
    .is-index .content > ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .is-index .content > ul > li {
      margin: 0;
      padding: 0.875rem 1rem;
      border: 1px solid var(--border-muted);
      border-radius: 8px;
      margin-bottom: 0.625rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .is-index .content > ul > li:hover {
      border-color: var(--link);
      background: var(--bg-subtle);
    }
    .is-index .content > ul > li > strong {
      font-size: 0.9375rem;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .is-index .content > ul > li > em:last-of-type {
      /* override the source-tag style for index items */
      background: none;
      color: var(--text-muted);
      font-size: inherit;
      padding: 0;
      margin: 0;
      border-radius: 0;
    }
    .is-index .content > ul > li a {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.25rem 0.625rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .is-index .content > ul > li a:hover {
      color: var(--link);
      border-color: var(--link);
      text-decoration: none;
    }
    .is-index .content > ul > li .digest-links {
      display: flex; gap: 0.5rem; flex-shrink: 0;
    }

    /* ── Footer ────────────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8125rem;
    }
    .site-footer a { color: var(--text-muted); }
    .site-footer a:hover { color: var(--link); }

    /* ── Save / Bookmarks ───────────────────────────────────── */
    .saved-count-btn {
      font-size: 0.8125rem;
      color: var(--text-muted);
      padding: 0.25rem 0.625rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .saved-count-btn:hover { color: var(--link); border-color: var(--link); }
    .saved-badge {
      background: var(--link);
      color: white;
      border-radius: 10px;
      padding: 0 5px;
      font-size: 0.68rem;
      font-weight: 700;
      line-height: 1.5;
      display: none;
    }
    .save-btn {
      border: 1px solid var(--border-muted);
      background: none;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 0.1em 0.5em;
      border-radius: 12px;
      margin-left: 0.4rem;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      vertical-align: middle;
      line-height: 1.5;
    }
    .save-btn:hover { color: var(--link); border-color: var(--link); }
    .save-btn.is-saved {
      color: var(--link);
      border-color: var(--accent-border);
      background: var(--accent-bg);
    }
    /* Saved panel */
    .saved-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .saved-overlay.open { display: block; }
    .saved-panel {
      position: fixed;
      top: 0; right: 0;
      width: min(460px, 96vw);
      height: 100%;
      background: var(--bg);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      z-index: 201;
      display: flex;
      flex-direction: column;
    }
    .saved-panel-header {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .saved-panel-title {
      font-size: 0.9375rem;
      font-weight: 700;
    }
    .saved-panel-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 0.25rem 0.375rem;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .saved-panel-close:hover { color: var(--text); background: var(--bg-subtle); }
    #saved-list {
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      flex: 1;
    }
    .saved-empty {
      color: var(--text-muted);
      font-size: 0.875rem;
      text-align: center;
      margin-top: 2rem;
      line-height: 1.7;
    }
    .saved-article-item {
      padding: 0.75rem;
      border: 1px solid var(--border-muted);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      transition: border-color 0.15s;
    }
    .saved-article-item:hover { border-color: var(--border); }
    .saved-article-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--link);
      text-decoration: none;
      line-height: 1.45;
    }
    .saved-article-title:hover { text-decoration: underline; }
    .saved-article-source {
      font-size: 0.7rem;
      font-weight: 500;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.1em 0.5em;
      border-radius: 20px;
      align-self: flex-start;
    }
    .saved-article-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.2rem;
    }
    .saved-remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.72rem;
      padding: 0;
      font-family: inherit;
      transition: color 0.15s;
    }
    .saved-remove-btn:hover { color: #cf222e; }
    .saved-clear-btn {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border-muted);
      border-radius: 6px;
      padding: 0.375rem 0.75rem;
      cursor: pointer;
      font-family: inherit;
      margin-top: 0.5rem;
      transition: color 0.15s, border-color 0.15s;
      align-self: flex-start;
    }
    .saved-clear-btn:hover { color: #cf222e; border-color: #cf222e; }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      main { padding: 1.5rem 1rem 4rem; }
      .site-header { padding: 0 1rem; }
      .is-index .content > ul > li {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="{{ site.baseurl }}/" class="site-logo">
      <span class="pip"></span>AI News Digest
    </a>
    {% assign url = page.url | remove: 'index.html' %}
    {% if url != '/' and url != '' %}
    <a href="{{ site.baseurl }}/" class="back-link">← All digests</a>
    {% endif %}
  </div>
</header>

<main>
  {% assign url = page.url | remove: 'index.html' %}
  <div class="content {% if url == '/' or url == '' %}is-index{% endif %}">
    {{ content }}
  </div>
</main>

<footer class="site-footer">
  <p>Generated automatically each morning &middot;
     <a href="https://github.com/eddyariki/news-feed-digest">GitHub</a></p>
</footer>

<script>
(function () {
  'use strict';

  /* ── localStorage helpers ───────────────────────────── */
  var KEY = 'nc_saved';
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (e) { return []; }
  }
  function setSaved(arr) { localStorage.setItem(KEY, JSON.stringify(arr)); }
  function isSaved(url) { return getSaved().some(function (a) { return a.url === url; }); }
  function saveArticle(url, title, source) {
    var arr = getSaved().filter(function (a) { return a.url !== url; });
    arr.unshift({ url: url, title: title, source: source || '', savedAt: new Date().toISOString() });
    setSaved(arr);
  }
  function unsaveArticle(url) { setSaved(getSaved().filter(function (a) { return a.url !== url; })); }

  /* ── Utilities ──────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ── Build saved panel overlay ──────────────────────── */
  var overlay = document.createElement('div');
  overlay.className = 'saved-overlay';
  overlay.innerHTML =
    '<div class="saved-panel">' +
      '<div class="saved-panel-header">' +
        '<span class="saved-panel-title">Saved Articles</span>' +
        '<button class="saved-panel-close" aria-label="Close">&#x2715;</button>' +
      '</div>' +
      '<div id="saved-list"></div>' +
    '</div>';
  document.body.appendChild(overlay);

  function openPanel()  { overlay.classList.add('open'); renderSavedList(); }
  function closePanel() { overlay.classList.remove('open'); }

  overlay.addEventListener('click', function (e) { if (e.target === overlay) closePanel(); });
  overlay.querySelector('.saved-panel-close').addEventListener('click', closePanel);

  function renderSavedList() {
    var list = document.getElementById('saved-list');
    var saved = getSaved();
    if (saved.length === 0) {
      list.innerHTML = '<p class="saved-empty">No saved articles yet.<br>Click <strong>Save</strong> on any article.</p>';
      return;
    }
    var html = saved.map(function (a) {
      return '<div class="saved-article-item">' +
        '<a class="saved-article-title" href="' + esc(a.url) + '" target="_blank" rel="noopener noreferrer">' + esc(a.title) + '</a>' +
        (a.source ? '<span class="saved-article-source">' + esc(a.source) + '</span>' : '') +
        '<div class="saved-article-meta">' +
          '<span>Saved ' + fmtDate(a.savedAt) + '</span>' +
          '<button class="saved-remove-btn" data-url="' + esc(a.url) + '">Remove</button>' +
        '</div>' +
      '</div>';
    }).join('') + '<button class="saved-clear-btn" id="saved-clear-btn">Clear all</button>';
    list.innerHTML = html;

    list.querySelectorAll('.saved-remove-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        unsaveArticle(btn.dataset.url);
        updateAllSaveBtns();
        updateHeaderCount();
        renderSavedList();
      });
    });
    var clearBtn = document.getElementById('saved-clear-btn');
    if (clearBtn) {
      clearBtn.addEventListener('click', function () {
        setSaved([]);
        updateAllSaveBtns();
        updateHeaderCount();
        renderSavedList();
      });
    }
  }

  /* ── Header "Saved" button ──────────────────────────── */
  var headerInner = document.querySelector('.header-inner');
  var savedBtn = document.createElement('button');
  savedBtn.className = 'saved-count-btn';
  savedBtn.innerHTML = 'Saved <span class="saved-badge" id="saved-badge"></span>';
  savedBtn.addEventListener('click', openPanel);
  var backLink = headerInner && headerInner.querySelector('.back-link');
  if (backLink) { headerInner.insertBefore(savedBtn, backLink); }
  else if (headerInner) { headerInner.appendChild(savedBtn); }

  function updateHeaderCount() {
    var count = getSaved().length;
    var badge = document.getElementById('saved-badge');
    if (!badge) return;
    badge.textContent = count > 0 ? String(count) : '';
    badge.style.display = count > 0 ? 'inline' : 'none';
  }

  function updateAllSaveBtns() {
    document.querySelectorAll('.save-btn').forEach(function (btn) {
      var saved = isSaved(btn.dataset.url);
      btn.textContent = saved ? '\u2713 Saved' : 'Save';
      btn.classList.toggle('is-saved', saved);
    });
  }

  /* ── Inject save buttons ────────────────────────────── */
  var isIndex = document.querySelector('.content.is-index');

  function makeSaveBtn(url, title, source) {
    var btn = document.createElement('button');
    btn.className = 'save-btn' + (isSaved(url) ? ' is-saved' : '');
    btn.dataset.url = url;
    btn.textContent = isSaved(url) ? '\u2713 Saved' : 'Save';
    btn.addEventListener('click', function () {
      if (isSaved(url)) {
        unsaveArticle(url);
        btn.textContent = 'Save';
        btn.classList.remove('is-saved');
      } else {
        saveArticle(url, title, source);
        btn.textContent = '\u2713 Saved';
        btn.classList.add('is-saved');
      }
      updateHeaderCount();
    });
    return btn;
  }

  if (!isIndex) {
    // Digest pages — news article list items: li > strong > a
    document.querySelectorAll('.content li').forEach(function (li) {
      var firstChild = li.children[0];
      if (!firstChild || firstChild.tagName !== 'STRONG') return;
      var link = firstChild.querySelector('a');
      if (!link) return;
      var sourceEl = li.querySelector('em');
      var source = sourceEl ? sourceEl.textContent.trim() : '';
      li.appendChild(makeSaveBtn(link.href, link.textContent.trim(), source));
    });

    // Papers pages — "**Link:** [Title](url)" paragraphs
    document.querySelectorAll('.content p').forEach(function (p) {
      var strong = p.querySelector('strong');
      if (!strong || strong.textContent.trim() !== 'Link:') return;
      var link = p.querySelector('a');
      if (!link) return;
      p.appendChild(makeSaveBtn(link.href, link.textContent.trim(), 'ArXiv'));
    });
  }

  /* ── External links ─────────────────────────────────── */
  document.querySelectorAll('.content a[href^="http"]').forEach(function (a) {
    a.setAttribute('target', '_blank');
    a.setAttribute('rel', 'noopener noreferrer');
  });

  updateHeaderCount();
}());
</script>
</body>
</html>
